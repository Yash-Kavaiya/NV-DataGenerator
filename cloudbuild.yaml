# Cloud Build pipeline: build -> push (Artifact Registry) -> deploy (Cloud Run).
#
# Triggered by GitHub Actions via `gcloud builds submit` (see
# .github/workflows/deploy.yml). Backend and frontend are built/pushed in
# parallel; the backend is deployed first so its URL can be injected into the
# frontend's nginx proxy (BACKEND_URL) at deploy time.
#
# Override any of the substitutions below with --substitutions on submit.

substitutions:
  # Image tag. Built-in $SHORT_SHA is only populated by Cloud Build triggers, not
  # by `gcloud builds submit`, so we pass the commit SHA explicitly from CI and
  # fall back to "latest" for manual local submits.
  _TAG: latest
  _REGION: us-central1
  _AR_REPO: nv-data-generator
  _BACKEND_SERVICE: nv-data-generator-backend
  _FRONTEND_SERVICE: nv-data-generator-frontend
  # Cloud Run runtime service account (name only; email is built per step).
  _RUNTIME_SA: nv-data-generator-run
  # Secret Manager secret holding the NVIDIA API key.
  _NVIDIA_SECRET: nvidia-api-key
  # Backend sizing. --no-cpu-throttling keeps CPU allocated so FastAPI
  # BackgroundTasks (generation jobs) keep running after the HTTP response.
  _BACKEND_MEMORY: 1Gi
  _BACKEND_CPU: "1"
  _BACKEND_TIMEOUT: "3600"
  _BACKEND_CONCURRENCY: "40"
  _BACKEND_MIN_INSTANCES: "0"
  _BACKEND_MAX_INSTANCES: "5"
  # Frontend sizing (static assets via nginx — cheap and stateless).
  _FRONTEND_MEMORY: 256Mi
  _FRONTEND_CPU: "1"
  _FRONTEND_CONCURRENCY: "80"
  _FRONTEND_MIN_INSTANCES: "0"
  _FRONTEND_MAX_INSTANCES: "5"

steps:
  # --- Warm the layer cache (ignore failure on the very first build) ---
  - id: pull-backend-cache
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - docker pull ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend:latest || exit 0
    waitFor: ["-"]

  - id: pull-frontend-cache
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - docker pull ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/frontend:latest || exit 0
    waitFor: ["-"]

  # --- Build images (BuildKit + inline cache so :latest seeds future builds) ---
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    env: ["DOCKER_BUILDKIT=1"]
    args:
      - build
      - --build-arg
      - BUILDKIT_INLINE_CACHE=1
      - --cache-from
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend:latest
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend:${_TAG}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend:latest
      - ./backend
    waitFor: ["pull-backend-cache"]

  - id: build-frontend
    name: gcr.io/cloud-builders/docker
    env: ["DOCKER_BUILDKIT=1"]
    args:
      - build
      - --build-arg
      - BUILDKIT_INLINE_CACHE=1
      - --cache-from
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/frontend:latest
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/frontend:${_TAG}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/frontend:latest
      - ./frontend
    waitFor: ["pull-frontend-cache"]

  # --- Push both tags (immutable SHA + moving latest) ---
  - id: push-backend
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        docker push ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend:${_TAG}
        docker push ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend:latest
    waitFor: ["build-backend"]

  - id: push-frontend
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        docker push ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/frontend:${_TAG}
        docker push ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/frontend:latest
    waitFor: ["build-frontend"]

  # --- Deploy backend first, then record its URL for the frontend ---
  - id: deploy-backend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        gcloud run deploy ${_BACKEND_SERVICE} \
          --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend:${_TAG} \
          --region=${_REGION} \
          --platform=managed \
          --port=8080 \
          --allow-unauthenticated \
          --service-account=${_RUNTIME_SA}@${PROJECT_ID}.iam.gserviceaccount.com \
          --set-secrets=NVIDIA_API_KEY=${_NVIDIA_SECRET}:latest \
          --memory=${_BACKEND_MEMORY} \
          --cpu=${_BACKEND_CPU} \
          --timeout=${_BACKEND_TIMEOUT} \
          --concurrency=${_BACKEND_CONCURRENCY} \
          --min-instances=${_BACKEND_MIN_INSTANCES} \
          --max-instances=${_BACKEND_MAX_INSTANCES} \
          --no-cpu-throttling \
          --labels=managed-by=cloud-build,commit=${_TAG}
        gcloud run services describe ${_BACKEND_SERVICE} \
          --region=${_REGION} --format='value(status.url)' > /workspace/backend_url.txt
        echo "Backend deployed at: $$(cat /workspace/backend_url.txt)"
    waitFor: ["push-backend"]

  # --- Deploy frontend, pointing its nginx proxy at the backend URL ---
  - id: deploy-frontend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        BACKEND_URL="$$(cat /workspace/backend_url.txt)"
        echo "Wiring frontend -> backend: $$BACKEND_URL"
        gcloud run deploy ${_FRONTEND_SERVICE} \
          --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/frontend:${_TAG} \
          --region=${_REGION} \
          --platform=managed \
          --port=8080 \
          --allow-unauthenticated \
          --set-env-vars=BACKEND_URL=$$BACKEND_URL \
          --memory=${_FRONTEND_MEMORY} \
          --cpu=${_FRONTEND_CPU} \
          --concurrency=${_FRONTEND_CONCURRENCY} \
          --min-instances=${_FRONTEND_MIN_INSTANCES} \
          --max-instances=${_FRONTEND_MAX_INSTANCES} \
          --labels=managed-by=cloud-build,commit=${_TAG}
        gcloud run services describe ${_FRONTEND_SERVICE} \
          --region=${_REGION} --format='value(status.url)' > /workspace/frontend_url.txt
        echo "Frontend deployed at: $$(cat /workspace/frontend_url.txt)"
    waitFor: ["push-frontend", "deploy-backend"]

  # --- Post-deploy smoke test: backend health + frontend reachability ---
  - id: smoke-test
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        BACKEND_URL="$$(cat /workspace/backend_url.txt)"
        FRONTEND_URL="$$(cat /workspace/frontend_url.txt)"
        echo "Health check: $$BACKEND_URL/api/v1/health"
        ok=0
        for i in $$(seq 1 12); do
          if curl -fsS "$$BACKEND_URL/api/v1/health" >/dev/null 2>&1; then ok=1; break; fi
          echo "  attempt $$i: backend not ready, retrying in 5s..."; sleep 5
        done
        if [ "$$ok" != "1" ]; then echo "Backend health check FAILED"; exit 1; fi
        echo "Backend healthy."
        curl -fsS -o /dev/null "$$FRONTEND_URL" && echo "Frontend reachable." || { echo "Frontend check FAILED"; exit 1; }
        echo ""
        echo "==================== Deployment summary ===================="
        echo "  Commit:   ${_TAG}"
        echo "  Backend:  $$BACKEND_URL"
        echo "  Frontend: $$FRONTEND_URL"
        echo "==========================================================="
    waitFor: ["deploy-frontend"]

# CLOUD_LOGGING_ONLY is required when the build runs as a user-specified service
# account (our build runner) and avoids needing a logs GCS bucket.
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1800s
