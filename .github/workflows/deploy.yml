name: Deploy to Cloud Run

# CD: on every push to main (and manual dispatch), authenticate to GCP with
# Workload Identity Federation (no JSON keys) and hand the build+deploy off to
# Cloud Build, which builds the images, pushes them to Artifact Registry, and
# rolls out both Cloud Run services. See docs/DEPLOYMENT.md for one-time setup.

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "cloudbuild.yaml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

# Never run two deploys at once; queue them so rollouts stay ordered.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # required for Workload Identity Federation

jobs:
  deploy:
    name: Build & deploy via Cloud Build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Submit build to Cloud Build
        run: |
          gcloud builds submit \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --config=cloudbuild.yaml \
            --service-account="projects/${{ vars.GCP_PROJECT_ID }}/serviceAccounts/${{ vars.BUILD_RUNNER_SA }}" \
            --substitutions="_TAG=${{ github.sha }},_REGION=${{ vars.GCP_REGION }},_AR_REPO=${{ vars.AR_REPO }},_BACKEND_SERVICE=${{ vars.BACKEND_SERVICE }},_FRONTEND_SERVICE=${{ vars.FRONTEND_SERVICE }},_RUNTIME_SA=${{ vars.RUNTIME_SA_NAME }},_NVIDIA_SECRET=${{ vars.NVIDIA_SECRET }}" \
            .
